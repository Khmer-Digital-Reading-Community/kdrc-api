services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: kdrc-api
    restart: unless-stopped
    command: sh -c "npx prisma generate && npm run start:dev"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - ${API_PORT:-3000}:3000
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net

  db:
    image: postgres:16-alpine
    container_name: kdrc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kdrc_db}
      POSTGRES_USER: ${POSTGRES_USER:-kdrc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kdrc_password}
    ports:
      - ${DB_PORT:-5432}:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kdrc_user} -d ${POSTGRES_DB:-kdrc_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend-net

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: kdrc-prisma-studio
    restart: unless-stopped
    command: sh -c "npx prisma studio --port ${PRISMA_STUDIO_PORT:-5555} --browser none"
    env_file:
      - .env
    ports:
      - ${PRISMA_STUDIO_PORT:-5555}:5555
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net

volumes:
  postgres-data:
    driver: local

networks:
  backend-net:
    driver: bridge
