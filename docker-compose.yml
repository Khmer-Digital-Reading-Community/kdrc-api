services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: kdrc-api
    restart: unless-stopped
    command: npm run start:dev
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - 3001:3000
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge
